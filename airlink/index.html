const durationMs = (d="") => {
  if(d.includes("3 month")) return 90*86400000;
  if(d.includes("2 month")) return 60*86400000;
  if(d.includes("month"))   return 30*86400000;
  if(d.includes("week"))    return  7*86400000;
  return 30*86400000;
};

const checkOverdue = (borrowedAt, duration="") => {
  if(!borrowedAt) return false;
  return Date.now() - new Date(borrowedAt).getTime() > durationMs(duration);
};

function useCountdown(book) {
  const [cd, setCd] = useState(null);
  useEffect(() => {
    if(book.available || !book.borrowedAt) return;
    const due = book.returnDate
      ? new Date(book.returnDate+"T23:59:59").getTime()
      : new Date(book.borrowedAt).getTime() + durationMs(book.duration);
    const ms = durationMs(book.duration);
    const calc = () => {
      const diff = due - Date.now();
      if(diff<=0){ setCd({days:0,hours:0,mins:0,secs:0,overdue:true,pct:100}); return; }
      setCd({days:Math.floor(diff/86400000),hours:Math.floor((diff%86400000)/3600000),mins:Math.floor((diff%3600000)/60000),secs:Math.floor((diff%60000)/1000),overdue:false,pct:Math.min(100,Math.round(((ms-diff)/ms)*100))});
    };
    calc();
    const id = setInterval(calc, 1000);
    return () => clearInterval(id);
  }, [book.borrowedAt, book.returnDate, book.duration, book.available]);
  return cd;
}

function guessCategory(title="", author="", subjects=[]) {
  const t = (title+" "+author+" "+subjects.join(" ")).toLowerCase();
  if(/children|juvenile|kids|picture book|fairy|童Book|儿童|绘 books|少儿|青少年|幼儿|child|school stories/.test(t)) return "Kids";
  if(/psychology|cognitive|behavior|behaviour|emotion|mental|therapy|mindfulness|trauma|anxiety|depression|心理|情绪|认知|治疗|咨询/.test(t)) return "Psychology";

  if(/education|learning|teaching|textbook|language|grammar|考试|教材|教育|学习|教学|语言|英语/.test(t)) return "Education";
  if(/health|medicine|medical|fitness|nutrition|diet|wellness|yoga|健康|医学|营养|健身|养生/.test(t)) return "Health";
  if(/history|历史|war|战争|dynasty|朝代|ancient|empire|revolution|biography|biograph/.test(t)) return "History";
  if(/science|tech|code|program|software|algorithm|physics|math|biology|engineering|machine|data|ai|artificial/.test(t)) return "Tech";
  if(/business|startup|management|zero to one|atomic habit/.test(t)) return "Business";
  if(/novel|fiction|story|tale|romance|mystery|thriller|poetry|poem|verse|gatsby|library|midnight|crawdad|alchemist|dune|orwell|kafka|tolstoy|dostoevsky|hemingway|woolf|austen/.test(t)) return "Fiction";
  if(/essay|philosophy|classic|literature|文学|prose|literary|fitzgerald|coelho|哈利|sapiens/.test(t)) return "Literature";
  return null; // no confident guess
}

  const push = (msg) => setMsgs(p=>[msg,...p]);
  const normalizeSupabaseUrl = (value) => {
    let url = String(value || "").trim().replace(/\/+$/, "");
    if(!url) return "";
    if(!/^https?:\/\//i.test(url)){
      url = url.includes(".") ? `https://${url}` : `https://${url}.supabase.co`;
    }
    return url;
  };
  const explainCloudError = (e) => {
    const msg = String(e?.message || e || "");
    if(/Failed to fetch|NetworkError|Load failed/i.test(msg)) return "连接失败：请检查 Supabase URL 是否正确，或当前网络是否能访问 Supabase";
    if(/Invalid API key|JWT|apikey|401|403/i.test(msg)) return "连接失败：anon public key 不正确，请确认没有填成 service_role/secret key";
    if(/not found|404/i.test(msg)) return "连接失败：items目 URL 不存在，请检查items目 ID";
    return msg || "连接失败：Unknown error";
  };
  const isCloudConfigured = () => !!normalizeSupabaseUrl(effectiveSupabaseUrl) && !!effectiveSupabaseAnonKey.trim();
  const getSupabaseClient = (silent=false) => {
    const url = normalizeSupabaseUrl(effectiveSupabaseUrl);
    const key = effectiveSupabaseAnonKey.trim();
    if(!url || !key){
      if(!silent) setCloudStatus("云端服务暂未配置，当前可继续使用Local mode");
      return null;
    }
    if(!window.supabase || !window.supabase.createClient){
      if(!silent) setCloudStatus("Supabase SDK 未加载，请检查网络后刷new");
      return null;
    }
    if(supabaseRef.current.client && supabaseRef.current.url===url && supabaseRef.current.key===key) {
      return supabaseRef.current.client;
    }
    const client = window.supabase.createClient(url, key);
    supabaseRef.current = {url, key, client};
    return client;
  };
  const testSupabaseConnection = async () => {
    const url = normalizeSupabaseUrl(effectiveSupabaseUrl);
    const key = effectiveSupabaseAnonKey.trim();
    if(!url || !key){
      setCloudStatus("云端服务暂未配置，当前可继续使用Local mode");
      return;
    }
    if(!window.supabase || !window.supabase.createClient){
      setCloudStatus("Supabase SDK 未加载，请检查网络后刷new");
      return;
    }
    try {
      new URL(url);
    } catch(e) {
      setCloudStatus("Supabase URL 格式不正确，应类似 https://items目ID.supabase.co");
      return;
    }
    setCloudBusy(true);
    setCloudStatus("正在测试 Supabase 连接…");
    try {
      if(cloudDeveloperSettingsVisible && url !== supabaseUrl.trim()) setSupabaseUrl(url);
      const authRes = await fetch(`${url}/auth/v1/settings`, { headers: { apikey: key } });
      if(authRes.status === 401 || authRes.status === 403) throw new Error("Invalid API key");
      if(authRes.status === 404) throw new Error("Project not found");
      if(!authRes.ok) throw new Error(`Auth 服务Back ${authRes.status}`);
      const client = window.supabase.createClient(url, key);
      supabaseRef.current = {url, key, client};
      setCloudStatus("Supabase 连接正常，可以Sign up或Sign in");
    } catch(e) {
      setCloudStatus(explainCloudError(e));
    } finally {
      setCloudBusy(false);
    }
  };
  const collectCloudData = () => ({
    registered, regName, regPhone, profileSyncedAt, radius, savedRadii, mapProvider, googleMapsApiKey, amapApiKey, myBooks, borrowed, bookReviews,
    borrowerReviews, msgs, friends, clubs, points, badges, exportedAt: new Date().toISOString()
  });
  const applyCloudData = (data) => {
    if(!data || typeof data !== "object") return;
    ["registered","regName","regPhone","profileSyncedAt","radius","savedRadii","mapProvider","googleMapsApiKey","amapApiKey","myBooks","borrowed","bookReviews","borrowerReviews","msgs","friends","clubs","points","badges"].forEach(k=>{
      if(Object.prototype.hasOwnProperty.call(data,k)) localStorage.setItem(LS_PREFIX + k, JSON.stringify(data[k]));
    });
    window.location.reload();
  };
  const runPendingAfterAuth = () => {
    const action = pendingActionRef.current;

  const addBookReview = (book, review) => {

      return {...prev, [key]: [review, ...(_optionalChain([prev, 'access', _20 => _20[key]]) || [])].slice(0,20)};

  const submitBorrowerReview = (review) => {

    setMyBooks(prev => prev.map(b => b.id===review.bookId ? {...b, available:true, status:"AVAILABLE", borrower:null, borrowedAt:null, returnDate:null} : b));
    push({id:Date.now(),name:"System",msg:`✅ 已确认收到《${review.bookTitle}，并给 ${review.borrower} 留下 ${review.stars} 星Reviews.`,time:"Just now",avatar:"🤖",isSystem:true});
    setReturnReviewBook(null);

  const collectBackupData = () => {
    const data = {};
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith(LS_PREFIX))
        .sort()
        .forEach(k => {
          const shortKey = k.slice(LS_PREFIX.length);
          try { data[shortKey] = JSON.parse(localStorage.getItem(k)); }
          catch(_) { data[shortKey] = localStorage.getItem(k); }
        });
    } catch(_) {}
    return data;
  };

  const exportBackup = () => {
    try {
      const payload = {
        app: "LinkNest",
        schema: "airlink-local-v1",
        build: document.querySelector('meta[name="build-id"]')?.content || "unknown",
        exportedAt: new Date().toISOString(),
        data: collectBackupData()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().slice(0, 10).replaceAll("-", "");
      a.href = url;
      a.download = `linknest-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setUpdateState("备份文件已生成");
    } catch(_) {
      setUpdateState("备份失败，请Later再试");
    }
  };

  const importBackupFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(String(reader.result || "{}"));
        if (parsed.schema !== "airlink-local-v1" || !parsed.data || typeof parsed.data !== "object") {
          throw new Error("invalid backup");
        }
        if (!confirm("Import backup会覆盖当前Local data，并Reload应用.确定继续吗？")) return;
        clearAllLS();
        Object.entries(parsed.data).forEach(([key, value]) => {
          localStorage.setItem(LS_PREFIX + key, JSON.stringify(value));
        });
        setUpdateState("备份已导入，正在Reload…");
        setTimeout(() => window.location.reload(), 350);
      } catch(_) {
        setUpdateState("导入失败：请选择 LinkNest 备份文件");
      } finally {
        if (importInputRef.current) importInputRef.current.value = "";
      }
    };
    reader.onerror = () => {
      setUpdateState("读取文件失败，请重试");
      if (importInputRef.current) importInputRef.current.value = "";
    };
    reader.readAsText(file);
  };

  const normalizePhone = (value) => {
    const cleaned = String(value || "").replace(/[^\d+]/g, "");
    return cleaned.length >= 6 ? cleaned : "";
  };

  const syncCloudProfile = async (user, options={}) => {
    const client = getSupabaseClient(true);
    if(!client || !user) return null;
    const localName = regName.trim();
    const fallbackName = user.user_metadata?.display_name || user.user_metadata?.name || user.email?.split("@")[0] || "LinkNest user";
    const displayName = (localName || fallbackName).slice(0, 40);
    const validGeoLabel = geoLabel && !["Locating...","Location unavailable"].includes(geoLabel) ? geoLabel : "";
    const now = new Date().toISOString();
    try {
      if(!options.quiet) setCloudStatus("正在同步用户资料…");
      const { data: existingProfile, error: profileReadError } = await client
        .from("profiles")
        .select("id, display_name, avatar_url, avatar_emoji, neighborhood, city, latitude, longitude, trust_score, total_lends, rating, settings")
        .eq("id", user.id)
        .maybeSingle();
      if(profileReadError) throw profileReadError;

      const profilePayload = {
        id: user.id,
        display_name: displayName || existingProfile?.display_name || "LinkNest user",
        avatar_url: existingProfile?.avatar_url || user.user_metadata?.avatar_url || null,
        avatar_emoji: existingProfile?.avatar_emoji || user.user_metadata?.avatar_emoji || "🧑",
        neighborhood: existingProfile?.neighborhood || validGeoLabel || null,
        city: existingProfile?.city || null,
        latitude: existingProfile?.latitude ?? geoCoords?.lat ?? null,
        longitude: existingProfile?.longitude ?? geoCoords?.lng ?? null,
        trust_score: existingProfile?.trust_score ?? Math.max(100, Number(points) || 100),
        total_lends: existingProfile?.total_lends ?? myBooks.filter(b=>b.status==="BORROWED").length,
        rating: existingProfile?.rating ?? null,
        settings: {
          ...(existingProfile?.settings || {}),
          local_schema: "airlink-local-v1",
          last_profile_sync_at: now
        }
      };

      const { data: savedProfile, error: profileError } = await client
        .from("profiles")
        .upsert(profilePayload, { onConflict: "id" })
        .select()
        .single();
      if(profileError) throw profileError;

      const { data: privateProfile, error: privateReadError } = await client
        .from("profile_private")
        .select("phone, phone_normalized")
        .eq("user_id", user.id)
        .maybeSingle();
      if(privateReadError) throw privateReadError;

      const localPhone = regPhone.trim();
      const phoneNormalized = normalizePhone(localPhone);
      if(localPhone && phoneNormalized){
        const { error: privateError } = await client
          .from("profile_private")
          .upsert({
            user_id: user.id,
            phone: localPhone,
            phone_normalized: phoneNormalized
          }, { onConflict: "user_id" });
        if(privateError) throw privateError;
      } else if(privateProfile?.phone && !regPhone){
        setRegPhone(privateProfile.phone);
      }

      setCloudProfile(savedProfile || profilePayload);
      setRegName(savedProfile?.display_name || profilePayload.display_name);
      setProfileSyncedAt(now);
      if(!options.quiet) setCloudStatus(`Signed in，资料已同步：${savedProfile?.display_name || profilePayload.display_name}`);
      return savedProfile || profilePayload;
    } catch(e) {
      if(!options.quiet) setCloudStatus(`资料同步失败：${e.message || e}`);
      throw e;
    }
  };

  useEffect(()=>{
    const client = getSupabaseClient(true);
    if(!client) return;
    let mounted = true;
    client.auth.getSession().then(({data})=>{
      if(!mounted) return;
      const user = data?.session?.user || null;
      setCloudUser(user);
      if(user){
        setRegistered(true);
        setRegName(user.user_metadata?.display_name || regName || user.email?.split("@")[0] || "LinkNest user");
        setCloudStatus(`Signed in：${user.email || user.id}`);
        syncCloudProfile(user, {quiet:true}).catch(e=>setCloudStatus(`Signed in，但资料同步失败：${e.message || e}`));
      }
    }).catch(()=>{});
    const { data: listener } = client.auth.onAuthStateChange((_event, session)=>{
      const user = session?.user || null;
      setCloudUser(user);
      if(user){
        setRegistered(true);
        setRegName(user.user_metadata?.display_name || regName || user.email?.split("@")[0] || "LinkNest user");
        setCloudStatus(`Signed in：${user.email || user.id}`);
        syncCloudProfile(user, {quiet:false})
          .catch(()=>{})
          .finally(runPendingAfterAuth);
      }
    });
    return ()=>{ mounted = false; listener?.subscription?.unsubscribe?.(); };
  }, [supabaseUrl, supabaseAnonKey]);

  const signInWithCloud = async (mode) => {
    const email = authEmail.trim();
    if(!email || authPassword.length < 6){
      setCloudStatus("请输入Email and 至少 6 位Password");
      return;
    }
    if(!isCloudConfigured()){
      if(mode === "signin" && !registered){
        setCloudStatus("云端服务暂未配置.请先点“Sign up”创建 books地测试账号");
        setAuthPassword("");
        return;
      }
      setRegistered(true);
      setRegName(regName || email.split("@")[0] || "LinkNest user");
      setCloudUser(null);
      setCloudStatus(mode==="signup" ? "已创建 books地测试账号，可继续Add book and 借Book" : `已使用 books地账号：${email}`);
      setAuthPassword("");
      runPendingAfterAuth();
      return;
    }
    const client = getSupabaseClient();
    if(!client) return;
    setCloudBusy(true);
    setCloudStatus(mode==="signup" ? "正在Sign up…" : "正在Sign in…");
    try {
      const args = { email, password: authPassword };
      const profileMeta = {
        display_name: regName || email.split("@")[0],
        phone: regPhone.trim() || undefined,
        avatar_emoji: "🧑"
      };
      const res = mode==="signup"
        ? await client.auth.signUp({ ...args, options: { data: profileMeta } })
        : await client.auth.signInWithPassword(args);
      if(res.error) throw res.error;
      const user = res.data?.user || res.data?.session?.user || null;
      if(user){
        setCloudUser(user);
        setRegistered(true);
        setRegName(user.user_metadata?.display_name || regName || email.split("@")[0]);
        if(res.data?.session){
          try {
            await syncCloudProfile(user, {quiet:true});
            setCloudStatus(`Signed in，资料已同步：${email}`);
          } catch(profileError) {
            setCloudStatus(`Signed in，但资料同步失败：${profileError.message || profileError}`);
          }
        } else {
          setCloudStatus("Sign up成功，请检查Email确认链接");
        }
        runPendingAfterAuth();
      } else {
        setCloudStatus("已提交，请检查Email确认链接");
      }
    } catch(e) {
      setCloudStatus(`账号操作失败：${e.message || e}`);
    } finally {
      setCloudBusy(false);
      setAuthPassword("");
    }
  };

    try{
      const { data, error } = await client.from("airlink_user_data").select("data").eq("user_id", user.id).maybeSingle();

  const enableWebPush = async () => {
    const client = getSupabaseClient();
    if(!client) return;
    const { data: { user } } = await client.auth.getUser();
    if(!user){ setPushStatus("请先Sign in后再Enable push"); return; }
    if(!("serviceWorker" in navigator) || !("PushManager" in window)){
      setPushStatus("当前浏览器不支持 Web Push");
      return;
    }
    if(!vapidPublicKey.trim()){
      setPushStatus("请填写 VAPID public key");
      return;
    }
    setPushStatus("正在申请通知权限…");
    try{
      const permission = await Notification.requestPermission();
      if(permission !== "granted"){ setPushStatus("通知权限未开启"); return; }
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidPublicKey.trim())
      });
      const json = sub.toJSON();
      const { error } = await client.from("airlink_push_subscriptions").upsert({
        user_id: user.id,
        endpoint: json.endpoint,
        subscription: json,
        user_agent: navigator.userAgent,
        updated_at: new Date().toISOString()
      }, { onConflict: "endpoint" });
      if(error) throw error;
      setPushStatus("推送订阅已Save");
    }catch(e){
      setPushStatus(`推送开启失败：${e.message || e}`);
    }
  };

  const disableWebPush = async () => {
    const client = getSupabaseClient(true);
    try{
      const reg = await navigator.serviceWorker?.ready;
      const sub = await reg?.pushManager?.getSubscription?.();
      const endpoint = sub?.endpoint;
      if(sub) await sub.unsubscribe();
      if(client && endpoint) await client.from("airlink_push_subscriptions").delete().eq("endpoint", endpoint);
      setPushStatus("已Disable push on this device订阅");
    }catch(e){
      setPushStatus(`关闭失败：${e.message || e}`);
    }
  };

      if(error) throw error;
      setPushStatus(`Test push已发送：${data?.sent || 0} 个订阅`);

      setPushStatus(`Test push失败：${e.message || e}`);

  const refreshAppShell = () => {
    if (!('serviceWorker' in navigator)) {
      setUpdateState("当前浏览器不支持Offline更new");
      return;
    }
    setUpdateState("正在Check update…");
    navigator.serviceWorker.getRegistration()
      .then(reg => reg ? reg.update() : null)
      .then(() => setUpdateState("已Check update，请重new打开或刷new应用"))

  <script>
    function setAppHeight(){
      const vv = window.visualViewport;
      const visibleH = Math.round((vv && vv.height) || window.innerHeight);
      const layoutH = Math.round(window.innerHeight || visibleH);
      const offsetTop = Math.round((vv && vv.offsetTop) || 0);
      const keyboardOffset = Math.max(0, layoutH - visibleH - offsetTop);
      const keyboardOpen = keyboardOffset > 80;
      document.documentElement.style.setProperty('--app-height', visibleH + 'px');
      document.documentElement.style.setProperty('--keyboard-offset', keyboardOffset + 'px');
      document.documentElement.classList.toggle('keyboard-open', keyboardOpen);
    }
    function keepFocusedFieldVisible(event){
      const target = event.target;
      if(!target || !/^(INPUT|TEXTAREA|SELECT)$/.test(target.tagName)) return;
      setTimeout(function(){
        try { target.scrollIntoView({block:'center',inline:'nearest',behavior:'smooth'}); } catch(e) {}
      }, 180);
    }
    setAppHeight();
    window.addEventListener('resize',setAppHeight);
    window.addEventListener('orientationchange',function(){setTimeout(setAppHeight,200);});
    if('visualViewport' in window) window.visualViewport.addEventListener('resize',setAppHeight);
    document.addEventListener('focusin',keepFocusedFieldVisible);
    if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(reg=>{reg.update();reg.addEventListener('updatefound',()=>{const nw=reg.installing;if(nw)nw.addEventListener('statechange',()=>{if(nw.state==='activated'&&navigator.serviceWorker.controller){console.log('[SW] New version, reloading');window.location.reload();}});});}).catch(()=>{});});}
