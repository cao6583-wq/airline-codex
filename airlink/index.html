const durationMs = (d="") => {
  if(d.includes("3 month")) return 90*86400000;
  if(d.includes("2 month")) return 60*86400000;
  if(d.includes("month"))   return 30*86400000;
  if(d.includes("week"))    return  7*86400000;
  return 30*86400000;
};

const checkOverdue = (borrowedAt, duration="") => {
  if(!borrowedAt) return false;
  return Date.now() - new Date(borrowedAt).getTime() > durationMs(duration);
};

function useCountdown(book) {
  const [cd, setCd] = useState(null);
  useEffect(() => {
    if(book.available || !book.borrowedAt) return;
    const due = book.returnDate
      ? new Date(book.returnDate+"T23:59:59").getTime()
      : new Date(book.borrowedAt).getTime() + durationMs(book.duration);
    const ms = durationMs(book.duration);
    const calc = () => {
      const diff = due - Date.now();
      if(diff<=0){ setCd({days:0,hours:0,mins:0,secs:0,overdue:true,pct:100}); return; }
      setCd({days:Math.floor(diff/86400000),hours:Math.floor((diff%86400000)/3600000),mins:Math.floor((diff%3600000)/60000),secs:Math.floor((diff%60000)/1000),overdue:false,pct:Math.min(100,Math.round(((ms-diff)/ms)*100))});
    };
    calc();
    const id = setInterval(calc, 1000);
    return () => clearInterval(id);
  }, [book.borrowedAt, book.returnDate, book.duration, book.available]);
  return cd;
}

  if(diff < 0) return `已逾期 ${Math.abs(diff)} 天`;

};

function guessCategory(title="", author="", subjects=[]) {
  const t = (title+" "+author+" "+subjects.join(" ")).toLowerCase();
  if(/children|juvenile|kids|picture book|fairy|童书|儿童|绘本|少儿|青少年|幼儿|child|school stories/.test(t)) return "儿童";

  if(/business|management|startup|entrepreneur|marketing|finance|economics|investment|leadership|商业|创业|管理|经济|金融|投资/.test(t)) return "商业";

  if(/education|learning|teaching|textbook|language|grammar|考试|教材|教育|学习|教学|语言|英语/.test(t)) return "教育";
  if(/health|medicine|medical|fitness|nutrition|diet|wellness|yoga|健康|医学|营养|健身|养生/.test(t)) return "健康";
  if(/history|历史|war|战争|dynasty|朝代|ancient|empire|revolution|biography|biograph/.test(t)) return "历史";
  if(/science|tech|code|program|software|algorithm|physics|math|biology|engineering|atomic|habit|machine|data|ai|artificial/.test(t)) return "科技";
  if(/novel|fiction|story|tale|romance|mystery|thriller|poetry|poem|verse|gatsby|library|midnight|crawdad|alchemist|dune|orwell|kafka|tolstoy|dostoevsky|hemingway|woolf|austen/.test(t)) return "小说";
  if(/essay|philosophy|classic|literature|文学|prose|literary|fitzgerald|coelho|哈利|sapiens/.test(t)) return "文学";
  return null; // no confident guess
}
